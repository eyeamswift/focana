name: Electron E2E

on:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build Renderer
        run: npm run build:renderer

      - name: Run Electron E2E
        run: xvfb-run -a env FOCANA_E2E=1 FOCANA_E2E_BACKGROUND=1 npm run test:e2e
