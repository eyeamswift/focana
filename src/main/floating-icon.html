<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Focana Floating Icon</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: transparent;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --timer-pill-bg: rgba(74, 51, 41, 0.96);
        --timer-pill-border: rgba(255, 249, 230, 0.2);
        --timer-pill-shadow: 0 12px 30px rgba(0, 0, 0, 0.24);
        --timer-pill-text: #fff9e6;
        --timer-pill-pulse-bar: rgba(245, 158, 11, 0.34);
        --timer-pill-pulse-glow: rgba(245, 158, 11, 0.32);
        --prompt-bg: rgba(255, 249, 238, 0.98);
        --prompt-border: rgba(191, 96, 13, 0.24);
        --prompt-shadow: 0 24px 48px rgba(46, 31, 24, 0.2);
        --prompt-title: #5f2a0a;
        --prompt-text: #7c2d12;
        --prompt-muted: #8f4d1f;
        --prompt-input-bg: rgba(255, 255, 255, 0.78);
        --prompt-input-border: rgba(191, 96, 13, 0.2);
        --prompt-ghost-bg: rgba(255, 245, 230, 0.82);
        --prompt-ghost-border: rgba(191, 96, 13, 0.18);
        --prompt-ghost-text: #7c2d12;
        --prompt-primary-bg: #b45309;
        --prompt-primary-text: #fff9ed;
        --prompt-backdrop: rgba(28, 19, 13, 0.12);
      }

      body[data-theme='dark'] {
        --timer-pill-bg: rgba(74, 51, 41, 0.96);
        --timer-pill-border: rgba(255, 249, 230, 0.2);
        --timer-pill-shadow: 0 12px 30px rgba(0, 0, 0, 0.24);
        --timer-pill-text: #fff9e6;
        --prompt-bg: rgba(52, 34, 28, 0.98);
        --prompt-border: rgba(252, 211, 77, 0.18);
        --prompt-shadow: 0 24px 54px rgba(0, 0, 0, 0.38);
        --prompt-title: #fff3d9;
        --prompt-text: #f8d7a2;
        --prompt-muted: #ddb987;
        --prompt-input-bg: rgba(255, 249, 230, 0.06);
        --prompt-input-border: rgba(255, 249, 230, 0.14);
        --prompt-ghost-bg: rgba(255, 249, 230, 0.06);
        --prompt-ghost-border: rgba(255, 249, 230, 0.16);
        --prompt-ghost-text: #fff3d9;
        --prompt-primary-bg: #f59e0b;
        --prompt-primary-text: #2c1608;
        --prompt-backdrop: rgba(0, 0, 0, 0.18);
      }

      #icon-button {
        width: 100%;
        height: 100%;
        border-radius: 9999px;
        border: 0;
        padding: 0;
        margin: 0;
        background: transparent !important;
        appearance: none;
        -webkit-appearance: none;
        box-shadow: none;
        outline: none;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-tap-highlight-color: transparent;
        overflow: hidden;
        transition: transform 0.18s ease, filter 0.18s ease;
      }

      #icon-button:focus-visible {
        outline: 2px solid rgba(255, 255, 255, 0.85);
        outline-offset: 2px;
      }

      #icon-button:hover {
        transform: translateY(-1px);
        filter: drop-shadow(0 8px 18px rgba(117, 74, 34, 0.16));
      }

      #icon-image {
        width: 64px;
        height: 64px;
        border-radius: 9999px;
        display: block;
        user-select: none;
        pointer-events: none;
        -webkit-user-drag: none;
        object-fit: cover;
      }

      #timer-pill {
        display: none;
        position: relative;
        width: 100%;
        height: 100%;
        align-items: center;
        justify-content: center;
        border-radius: 9999px;
        background: var(--timer-pill-bg);
        border: 1px solid var(--timer-pill-border);
        box-shadow: var(--timer-pill-shadow);
        color: var(--timer-pill-text);
        font-family: ui-monospace, monospace;
        font-size: 18px;
        font-weight: 800;
        letter-spacing: 0.02em;
        user-select: none;
        overflow: hidden;
        transition: box-shadow 0.18s ease, border-color 0.18s ease;
      }

      #timer-label {
        position: relative;
        z-index: 1;
      }

      #timer-controls {
        position: absolute;
        inset: 0;
        z-index: 2;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.35rem;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.16s ease;
        background: linear-gradient(90deg, transparent 0%, rgba(0, 0, 0, 0.04) 12%, rgba(0, 0, 0, 0.04) 88%, transparent 100%);
      }

      #timer-pill.controls-visible #timer-label {
        opacity: 0;
      }

      #timer-pill.controls-visible #timer-controls {
        opacity: 1;
        pointer-events: auto;
      }

      .timer-control-btn {
        width: 28px;
        height: 28px;
        border: 0;
        border-radius: 9999px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        color: inherit;
        background: rgba(255, 255, 255, 0.2);
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.12);
      }

      body[data-theme='light'] .timer-control-btn {
        background: rgba(255, 255, 255, 0.7);
      }

      .timer-control-btn:hover {
        transform: translateY(-1px);
      }

      .timer-control-btn svg {
        width: 14px;
        height: 14px;
      }

      #timer-pill::after {
        content: '';
        position: absolute;
        top: 3px;
        bottom: 3px;
        left: -20px;
        width: 18px;
        border-radius: 9999px;
        background: var(--timer-pill-pulse-bar);
        box-shadow: 0 0 14px var(--timer-pill-pulse-glow);
        opacity: 0;
        pointer-events: none;
      }

      #prompt-shell {
        position: relative;
        display: none;
        width: 100%;
        height: 100%;
      }

      #prompt-backdrop {
        position: absolute;
        inset: 0;
        border-radius: 22px;
        background: var(--prompt-backdrop);
      }

      #prompt-card {
        position: absolute;
        inset: 10px;
        display: flex;
        flex-direction: column;
        border-radius: 22px;
        border: 1px solid var(--prompt-border);
        background:
          radial-gradient(120% 120% at 50% 0%, color-mix(in srgb, var(--prompt-primary-bg) 11%, transparent) 0%, transparent 52%),
          linear-gradient(180deg, color-mix(in srgb, var(--prompt-bg) 96%, transparent) 0%, var(--prompt-bg) 100%);
        box-shadow: var(--prompt-shadow);
        color: var(--prompt-text);
        overflow: hidden;
      }

      .prompt-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
        padding: 0.8rem 0.95rem 0;
      }

      .prompt-header__spacer {
        width: 4.25rem;
      }

      .prompt-header__btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 1.9rem;
        padding: 0 0.7rem;
        border-radius: 9999px;
        border: 1px solid var(--prompt-ghost-border);
        background: var(--prompt-ghost-bg);
        color: var(--prompt-ghost-text);
        font-size: 0.75rem;
        font-weight: 700;
        cursor: pointer;
      }

      .prompt-header__btn:hover {
        transform: translateY(-1px);
      }

      .prompt-body {
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 0.65rem 0.95rem 0.95rem;
        overflow-y: auto;
      }

      .prompt-step {
        display: none;
        flex: 1;
        flex-direction: column;
        justify-content: center;
        gap: 0.8rem;
        min-height: 100%;
      }

      .prompt-step.is-active {
        display: flex;
      }

      .prompt-title {
        margin: 0;
        font-size: 1.02rem;
        font-weight: 800;
        letter-spacing: -0.02em;
        color: var(--prompt-title);
        text-align: center;
      }

      .prompt-copy {
        margin: 0;
        font-size: 0.82rem;
        line-height: 1.5;
        color: var(--prompt-muted);
        text-align: center;
      }

      .prompt-task-name {
        color: var(--prompt-title);
        font-weight: 800;
      }

      .prompt-input,
      .prompt-textarea {
        width: 100%;
        border-radius: 14px;
        border: 1px solid var(--prompt-input-border);
        background: var(--prompt-input-bg);
        color: var(--prompt-title);
        font-family: inherit;
        font-size: 0.92rem;
        line-height: 1.4;
        outline: none;
        box-sizing: border-box;
      }

      .prompt-input {
        height: 2.85rem;
        padding: 0 0.85rem;
      }

      .prompt-textarea {
        min-height: 5.2rem;
        max-height: 5.2rem;
        padding: 0.78rem 0.85rem;
        resize: none;
      }

      .prompt-input:focus,
      .prompt-textarea:focus {
        border-color: color-mix(in srgb, var(--prompt-primary-bg) 82%, transparent);
        box-shadow: 0 0 0 2px color-mix(in srgb, var(--prompt-primary-bg) 18%, transparent);
      }

      .prompt-actions {
        display: flex;
        gap: 0.55rem;
      }

      .prompt-actions--column {
        flex-direction: column;
      }

      .prompt-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.4rem;
        min-height: 2.5rem;
        padding: 0.7rem 0.95rem;
        border-radius: 14px;
        border: 1px solid transparent;
        font-size: 0.84rem;
        font-weight: 800;
        cursor: pointer;
        transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, background 0.18s ease;
      }

      .prompt-btn:hover:not(:disabled) {
        transform: translateY(-1px);
      }

      .prompt-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .prompt-btn--primary {
        background: var(--prompt-primary-bg);
        color: var(--prompt-primary-text);
        box-shadow: 0 12px 22px rgba(180, 83, 9, 0.22);
      }

      .prompt-btn--ghost {
        background: var(--prompt-ghost-bg);
        border-color: var(--prompt-ghost-border);
        color: var(--prompt-ghost-text);
      }

      .prompt-btn--soft {
        flex: 1;
        background: rgba(255, 255, 255, 0.54);
        border-color: var(--prompt-ghost-border);
        color: var(--prompt-ghost-text);
      }

      body[data-theme='dark'] .prompt-btn--soft {
        background: rgba(255, 249, 230, 0.08);
      }

      .prompt-chip-row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.45rem;
      }

      .prompt-chip {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 2.2rem;
        padding: 0.45rem 0.8rem;
        border-radius: 9999px;
        border: 1px solid var(--prompt-ghost-border);
        background: var(--prompt-ghost-bg);
        color: var(--prompt-ghost-text);
        font-size: 0.78rem;
        font-weight: 800;
        cursor: pointer;
      }

      .prompt-chip:hover {
        transform: translateY(-1px);
      }

      .prompt-chip.is-active {
        border-color: transparent;
        background: color-mix(in srgb, var(--prompt-primary-bg) 88%, white 12%);
        color: var(--prompt-primary-text);
        box-shadow: 0 10px 18px rgba(180, 83, 9, 0.18);
      }

      .prompt-chooser-task {
        padding: 0.7rem 0.8rem;
        border-radius: 14px;
        border: 1px solid var(--prompt-ghost-border);
        background: color-mix(in srgb, var(--prompt-ghost-bg) 92%, transparent);
      }

      .prompt-chooser-task__label {
        display: block;
        margin-bottom: 0.25rem;
        font-size: 0.68rem;
        font-weight: 800;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--prompt-muted);
      }

      .prompt-chooser-task__value {
        display: block;
        font-size: 0.9rem;
        line-height: 1.35;
        font-weight: 700;
        color: var(--prompt-title);
        overflow-wrap: anywhere;
      }

      .prompt-inline-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 0.55rem;
        align-items: stretch;
      }

      .prompt-inline-row .prompt-input {
        min-width: 0;
      }

      .prompt-inline-row .prompt-btn {
        min-width: 11rem;
      }

      #prompt-step-chooser {
        justify-content: flex-start;
        gap: 0.7rem;
      }

      #prompt-step-chooser .prompt-chooser-task {
        padding: 0.62rem 0.78rem;
      }

      #prompt-step-chooser .prompt-chip-row {
        row-gap: 0.4rem;
      }

      #prompt-step-chooser .prompt-actions {
        margin-top: 0.05rem;
      }

      #prompt-step-chooser .prompt-actions .prompt-btn {
        width: 100%;
      }

      #prompt-step-start {
        justify-content: flex-start;
        gap: 0.7rem;
      }

      #prompt-step-start .prompt-actions {
        margin-top: 0.1rem;
      }

      #prompt-step-start .prompt-actions .prompt-btn {
        width: 100%;
      }

      #prompt-step-resume {
        justify-content: flex-start;
        gap: 0.9rem;
      }

      #prompt-step-resume .prompt-actions {
        margin-top: 0.1rem;
      }

      #prompt-step-snooze {
        justify-content: flex-start;
        gap: 0.7rem;
      }

      #prompt-step-snooze .prompt-actions {
        margin-top: 0.05rem;
      }

      #prompt-step-snooze .prompt-actions .prompt-btn {
        width: 100%;
      }

      .prompt-card--attention {
        animation: promptCardAttention 1.4s ease-in-out infinite;
      }

      body[data-mode='timer'] #icon-image,
      body[data-mode='prompt'] #icon-image {
        display: none;
      }

      body[data-mode='timer'] #timer-pill {
        display: inline-flex;
      }

      body[data-mode='prompt'] #icon-button,
      body[data-mode='prompt'] #timer-pill {
        display: none;
      }

      body[data-mode='prompt'] #prompt-shell {
        display: block;
      }

      body[data-mode='timer'] #icon-button {
        border-radius: 9999px;
      }

      body[data-mode='timer'] #icon-button:hover #timer-pill {
        box-shadow: 0 14px 30px rgba(117, 74, 34, 0.24);
        border-color: color-mix(in srgb, var(--timer-pill-border) 55%, rgba(245, 158, 11, 0.45));
      }

      #icon-button.pulse {
        animation: floatingPulse 1.8s ease-in-out 3;
      }

      #timer-pill.pulse::after {
        animation: timerPillSweep 1.5s ease-in-out 2;
      }

      @keyframes floatingPulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
          filter: drop-shadow(0 0 0 rgba(245, 158, 11, 0));
        }
        50% {
          transform: scale(2);
          opacity: 0.88;
          filter: drop-shadow(0 0 10px rgba(245, 158, 11, 0.5));
        }
      }

      @keyframes timerPillSweep {
        0% {
          transform: translateX(0) scaleX(0.85);
          opacity: 0;
        }
        15% {
          opacity: 1;
        }
        50% {
          transform: translateX(70px) scaleX(1);
          opacity: 0.92;
        }
        85% {
          opacity: 0.9;
        }
        100% {
          transform: translateX(140px) scaleX(0.9);
          opacity: 0;
        }
      }

      @keyframes promptCardAttention {
        0%,
        100% {
          transform: translateY(0) scale(1);
          box-shadow: var(--prompt-shadow);
        }
        50% {
          transform: translateY(-1px) scale(1.01);
          box-shadow:
            0 0 0 1px color-mix(in srgb, var(--prompt-primary-bg) 16%, transparent),
            0 0 0 8px color-mix(in srgb, var(--prompt-primary-bg) 10%, transparent),
            0 26px 56px rgba(46, 31, 24, 0.28);
        }
      }
    </style>
  </head>
  <body>
    <div id="icon-button" role="button" tabindex="0" aria-label="Expand Focana">
      <img id="icon-image" src="../assets/logo-floating-circle.svg" alt="Focana" draggable="false" />
      <span id="timer-pill">
        <span id="timer-label">00:00</span>
        <span id="timer-controls" aria-hidden="true">
          <button id="timer-toggle-btn" class="timer-control-btn" type="button" aria-label="Pause or resume timer" title="Pause or resume">
            <svg id="timer-toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M8 5v14" />
              <path d="M16 5v14" />
            </svg>
          </button>
          <button id="timer-stop-btn" class="timer-control-btn" type="button" aria-label="Stop timer" title="Stop and save">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <rect x="7" y="7" width="10" height="10" rx="1.5" />
            </svg>
          </button>
        </span>
      </span>
    </div>

    <div id="prompt-shell" aria-hidden="true">
      <div id="prompt-backdrop"></div>
      <div id="prompt-card" role="dialog" aria-modal="true" aria-labelledby="prompt-title">
        <div class="prompt-header">
          <button id="prompt-back-btn" class="prompt-header__btn" type="button">Back</button>
          <span class="prompt-header__spacer" id="prompt-header-spacer"></span>
          <button id="prompt-dismiss-btn" class="prompt-header__btn" type="button">Snooze</button>
        </div>
        <div class="prompt-body">
          <section id="prompt-step-start" class="prompt-step" data-stage="task-entry">
            <h2 id="prompt-title" class="prompt-title">What are you working on?</h2>
            <p class="prompt-copy">Enter your next focus, then choose a timer or Freeflow.</p>
            <textarea
              id="prompt-task-input"
              class="prompt-textarea"
              rows="2"
              placeholder="Type your task here..."
            ></textarea>
            <div class="prompt-actions">
              <button id="prompt-task-next-btn" class="prompt-btn prompt-btn--primary" type="button">Next</button>
            </div>
          </section>

          <section id="prompt-step-resume" class="prompt-step" data-stage="resume-choice">
            <h2 class="prompt-title">Ready to resume?</h2>
            <p class="prompt-copy">
              Pick up <span id="prompt-resume-task-name" class="prompt-task-name">this task</span>,
              or wrap it up first and start something new.
            </p>
            <div class="prompt-actions prompt-actions--column">
              <button id="prompt-resume-btn" class="prompt-btn prompt-btn--primary" type="button">Resume Previous Task</button>
              <button id="prompt-start-new-btn" class="prompt-btn prompt-btn--ghost" type="button">Start Something New</button>
            </div>
          </section>

          <section id="prompt-step-chooser" class="prompt-step" data-stage="start-chooser">
            <div class="prompt-chooser-task">
              <span class="prompt-chooser-task__label">Task</span>
              <span id="prompt-chooser-task-value" class="prompt-chooser-task__value">Untitled task</span>
            </div>
            <div class="prompt-chip-row">
              <button class="prompt-chip" id="prompt-quick-15" type="button">15m</button>
              <button class="prompt-chip" id="prompt-quick-25" type="button">25m</button>
              <button class="prompt-chip" id="prompt-quick-45" type="button">45m</button>
              <button class="prompt-chip" id="prompt-quick-custom" type="button">Custom</button>
            </div>
            <div class="prompt-inline-row">
              <input id="prompt-minutes-input" class="prompt-input" type="number" min="1" max="240" step="1" value="25" />
              <button id="prompt-start-timed-btn" class="prompt-btn prompt-btn--primary" type="button">Start Timer</button>
            </div>
            <div class="prompt-actions">
              <button id="prompt-freeflow-btn" class="prompt-btn prompt-btn--ghost" type="button">Freeflow</button>
            </div>
          </section>

          <section id="prompt-step-snooze" class="prompt-step" data-stage="snooze-options">
            <h2 class="prompt-title">Snooze reminder</h2>
            <p class="prompt-copy">Pick when this should come back.</p>
            <div class="prompt-actions prompt-actions--column">
              <button id="prompt-snooze-10" class="prompt-btn prompt-btn--soft" type="button">10 minutes</button>
              <button id="prompt-snooze-30" class="prompt-btn prompt-btn--soft" type="button">30 minutes</button>
              <button id="prompt-snooze-60" class="prompt-btn prompt-btn--soft" type="button">1 hour</button>
              <button id="prompt-snooze-120" class="prompt-btn prompt-btn--soft" type="button">2 hours</button>
              <button id="prompt-snooze-reopen" class="prompt-btn prompt-btn--ghost" type="button">Until I reopen</button>
            </div>
          </section>
        </div>
      </div>
    </div>

    <script>
      const iconButton = document.getElementById('icon-button');
      const timerPill = document.getElementById('timer-pill');
      const timerLabel = document.getElementById('timer-label');
      const timerControls = document.getElementById('timer-controls');
      const timerToggleButton = document.getElementById('timer-toggle-btn');
      const timerToggleIcon = document.getElementById('timer-toggle-icon');
      const timerStopButton = document.getElementById('timer-stop-btn');
      const promptShell = document.getElementById('prompt-shell');
      const promptCard = document.getElementById('prompt-card');
      const promptBackdrop = document.getElementById('prompt-backdrop');
      const promptBackButton = document.getElementById('prompt-back-btn');
      const promptDismissButton = document.getElementById('prompt-dismiss-btn');
      const promptStartStep = document.getElementById('prompt-step-start');
      const promptResumeStep = document.getElementById('prompt-step-resume');
      const promptChooserStep = document.getElementById('prompt-step-chooser');
      const promptSnoozeStep = document.getElementById('prompt-step-snooze');
      const promptTaskInput = document.getElementById('prompt-task-input');
      const promptTaskNextButton = document.getElementById('prompt-task-next-btn');
      const promptResumeTaskName = document.getElementById('prompt-resume-task-name');
      const promptChooserTaskValue = document.getElementById('prompt-chooser-task-value');
      const promptMinutesInput = document.getElementById('prompt-minutes-input');
      const promptStartTimedButton = document.getElementById('prompt-start-timed-btn');
      const promptFreeflowButton = document.getElementById('prompt-freeflow-btn');
      const promptResumeButton = document.getElementById('prompt-resume-btn');
      const promptStartNewButton = document.getElementById('prompt-start-new-btn');
      const promptQuick15 = document.getElementById('prompt-quick-15');
      const promptQuick25 = document.getElementById('prompt-quick-25');
      const promptQuick45 = document.getElementById('prompt-quick-45');
      const promptQuickCustom = document.getElementById('prompt-quick-custom');
      const promptSnooze10 = document.getElementById('prompt-snooze-10');
      const promptSnooze30 = document.getElementById('prompt-snooze-30');
      const promptSnooze60 = document.getElementById('prompt-snooze-60');
      const promptSnooze120 = document.getElementById('prompt-snooze-120');
      const promptSnoozeReopen = document.getElementById('prompt-snooze-reopen');
      const dragThresholdPx = 6;
      const clickDelayMs = 220;
      const controlsHideMs = 3000;
      let dragActive = false;
      let dragMoved = false;
      let dragStartScreenX = 0;
      let dragStartScreenY = 0;
      let clickTimer = null;
      let controlsHideTimer = null;
      let currentMode = 'icon';
      let currentRunning = false;
      let currentPromptKind = 'start';
      let currentPromptStage = 'task-entry';
      let promptStageBeforeSnooze = 'task-entry';
      let currentPromptKey = null;
      let currentPromptStrongActive = false;
      let currentResumeTaskName = '';
      let localTaskText = '';
      let localMinutes = '25';

      function getFloatingAPI() {
        return window.floatingAPI;
      }

      function expandMainWindow() {
        getFloatingAPI()?.expand?.();
      }

      function emitReentryAction(action, payload = {}) {
        getFloatingAPI()?.reentryAction?.(action, payload);
      }

      function triggerPulse() {
        iconButton.classList.remove('pulse');
        timerPill.classList.remove('pulse');
        void iconButton.offsetWidth;
        iconButton.classList.add('pulse');
        void timerPill.offsetWidth;
        timerPill.classList.add('pulse');
      }

      function clearPendingClick() {
        if (!clickTimer) return;
        clearTimeout(clickTimer);
        clickTimer = null;
      }

      function clearControlsTimer() {
        if (!controlsHideTimer) return;
        clearTimeout(controlsHideTimer);
        controlsHideTimer = null;
      }

      function hideTimerControls() {
        clearControlsTimer();
        timerPill.classList.remove('controls-visible');
      }

      function showTimerControls() {
        if (currentMode !== 'timer') return;
        clearControlsTimer();
        timerPill.classList.add('controls-visible');
        controlsHideTimer = setTimeout(() => {
          timerPill.classList.remove('controls-visible');
          controlsHideTimer = null;
        }, controlsHideMs);
      }

      function queueExpand() {
        clearPendingClick();
        clickTimer = setTimeout(() => {
          expandMainWindow();
          clickTimer = null;
        }, clickDelayMs);
      }

      function clampMinutesValue(rawValue) {
        const parsed = Number.parseInt(String(rawValue || '').trim(), 10);
        if (!Number.isFinite(parsed)) return null;
        return Math.min(Math.max(parsed, 1), 240);
      }

      function syncQuickChips() {
        const safeMinutes = clampMinutesValue(localMinutes);
        [
          [promptQuick15, 15],
          [promptQuick25, 25],
          [promptQuick45, 45],
        ].forEach(([button, value]) => {
          button.classList.toggle('is-active', safeMinutes === value);
        });
      }

      function focusPromptField(stage) {
        requestAnimationFrame(() => {
          if (stage === 'task-entry') {
            promptTaskInput.focus();
            promptTaskInput.setSelectionRange(promptTaskInput.value.length, promptTaskInput.value.length);
            return;
          }
          if (stage === 'start-chooser') {
            promptMinutesInput.focus();
            promptMinutesInput.select();
          }
        });
      }

      function renderPrompt() {
        promptShell.setAttribute('aria-hidden', currentMode === 'prompt' ? 'false' : 'true');
        promptStartStep.classList.toggle('is-active', currentPromptStage === 'task-entry');
        promptResumeStep.classList.toggle('is-active', currentPromptStage === 'resume-choice');
        promptChooserStep.classList.toggle('is-active', currentPromptStage === 'start-chooser');
        promptSnoozeStep.classList.toggle('is-active', currentPromptStage === 'snooze-options');

        promptTaskInput.value = localTaskText;
        promptMinutesInput.value = localMinutes;
        promptResumeTaskName.textContent = currentResumeTaskName || 'this task';
        promptChooserTaskValue.textContent = (currentPromptKind === 'resume-choice'
          ? currentResumeTaskName
          : localTaskText).trim() || 'Untitled task';

        const trimmedTask = localTaskText.trim();
        promptTaskNextButton.disabled = trimmedTask.length === 0;
        const canGoBack = currentPromptStage === 'start-chooser' || currentPromptStage === 'snooze-options';
        promptBackButton.style.visibility = canGoBack ? 'visible' : 'hidden';
        promptDismissButton.style.visibility = currentPromptStage === 'snooze-options' ? 'hidden' : 'visible';
        promptCard.classList.toggle('prompt-card--attention', currentMode === 'prompt' && currentPromptStrongActive);
        syncQuickChips();
      }

      function setPromptStage(stage, { notifyMain = true, focusField = true } = {}) {
        currentPromptStage = stage;
        if (stage !== 'snooze-options') {
          promptStageBeforeSnooze = stage;
        }
        renderPrompt();
        if (notifyMain) {
          getFloatingAPI()?.setPromptStage?.(stage);
        }
        if (focusField) {
          focusPromptField(stage);
        }
      }

      function openSnoozeOptions() {
        setPromptStage('snooze-options');
      }

      function submitTimedSession(kind) {
        const safeMinutes = clampMinutesValue(localMinutes);
        if (!safeMinutes) {
          promptMinutesInput.focus();
          return;
        }

        emitReentryAction('start-session', {
          promptKind: kind,
          mode: 'timed',
          minutes: safeMinutes,
          taskText: localTaskText.trim(),
        });
      }

      function submitFreeflowSession(kind) {
        emitReentryAction('start-session', {
          promptKind: kind,
          mode: 'freeflow',
          minutes: 0,
          taskText: localTaskText.trim(),
        });
      }

      function dismissWithSnooze(kind) {
        emitReentryAction('snooze', { kind });
      }

      function applyState(state) {
        const nextMode = state && typeof state === 'object' && state.mode === 'prompt'
          ? 'prompt'
          : state && state.mode === 'timer'
            ? 'timer'
            : 'icon';
        const nextTheme = state && state.theme === 'dark' ? 'dark' : 'light';
        currentRunning = state?.running !== false;
        currentMode = nextMode;
        currentPromptStrongActive = state?.strongActive === true;
        const nextTimeText = typeof state?.timeText === 'string' && state.timeText.trim()
          ? state.timeText.trim()
          : '00:00';
        document.body.dataset.mode = nextMode;
        document.body.dataset.theme = nextTheme;
        timerLabel.textContent = nextTimeText;
        timerToggleButton.setAttribute('aria-label', currentRunning ? 'Pause timer' : 'Resume timer');
        timerToggleButton.setAttribute('title', currentRunning ? 'Pause timer' : 'Resume timer');
        timerToggleIcon.innerHTML = currentRunning
          ? '<path d="M8 5v14" /><path d="M16 5v14" />'
          : '<path d="M8 5v14l11-7z" fill="currentColor" stroke="none" />';

        if (nextMode === 'prompt') {
          const promptKeyChanged = currentPromptKey !== state?.promptKey;
          const promptKindChanged = currentPromptKind !== state?.promptKind;
          currentPromptKind = state?.promptKind === 'resume-choice' ? 'resume-choice' : 'start';
          currentResumeTaskName = typeof state?.resumeTaskName === 'string' ? state.resumeTaskName.trim() : '';
          if (promptKeyChanged || promptKindChanged) {
            currentPromptKey = state?.promptKey ?? null;
            localTaskText = typeof state?.defaultTaskText === 'string' ? state.defaultTaskText : '';
            localMinutes = String(clampMinutesValue(state?.defaultMinutes) || 25);
            const initialStage = currentPromptKind === 'resume-choice' ? 'resume-choice' : 'task-entry';
            promptStageBeforeSnooze = initialStage;
            setPromptStage(initialStage, { notifyMain: true });
            return;
          }
          renderPrompt();
          return;
        }

        currentPromptKey = null;
        currentPromptStrongActive = false;
        hideTimerControls();
        iconButton.setAttribute('aria-label', nextMode === 'timer' ? `Expand Focana timer ${nextTimeText}` : 'Expand Focana');
        renderPrompt();
      }

      let activeDragPointerId = null;

      function beginDrag(screenX, screenY, pointerId) {
        dragActive = true;
        dragMoved = false;
        dragStartScreenX = screenX;
        dragStartScreenY = screenY;
        activeDragPointerId = pointerId ?? null;
        getFloatingAPI()?.dragStart?.();
      }

      function moveDrag(screenX, screenY) {
        if (!dragActive) return;
        const dx = screenX - dragStartScreenX;
        const dy = screenY - dragStartScreenY;
        if (Math.abs(dx) > dragThresholdPx || Math.abs(dy) > dragThresholdPx) {
          dragMoved = true;
        }
        getFloatingAPI()?.dragMove?.(dx, dy);
      }

      function finishDrag() {
        if (!dragActive) return;
        dragActive = false;
        if (activeDragPointerId != null) {
          try { iconButton.releasePointerCapture(activeDragPointerId); } catch (_) {}
        }
        activeDragPointerId = null;
        getFloatingAPI()?.dragEnd?.();
      }

      iconButton.addEventListener('pointerdown', (event) => {
        if (event.button !== 0) return;
        if (timerControls.contains(event.target)) return;
        try { iconButton.setPointerCapture(event.pointerId); } catch (_) {}
        beginDrag(event.screenX, event.screenY, event.pointerId);
      });

      document.addEventListener('pointermove', (event) => {
        if (!dragActive) return;
        moveDrag(event.screenX, event.screenY);
      });

      document.addEventListener('pointerup', (event) => {
        if (!dragActive || event.button !== 0) return;
        finishDrag();
      });

      window.addEventListener('blur', () => {
        if (!dragActive) return;
        finishDrag();
      });

      iconButton.addEventListener('click', (event) => {
        if (dragMoved) {
          dragMoved = false;
          event.preventDefault();
          return;
        }
        if (currentMode === 'timer') {
          event.preventDefault();
          showTimerControls();
          return;
        }
        queueExpand();
      });

      iconButton.addEventListener('dblclick', (event) => {
        event.preventDefault();
        dragMoved = false;
        clearPendingClick();
        expandMainWindow();
      });

      iconButton.addEventListener('contextmenu', (event) => {
        event.preventDefault();
        if (activeDragPointerId != null) {
          try { iconButton.releasePointerCapture(activeDragPointerId); } catch (_) {}
          activeDragPointerId = null;
        }
        dragActive = false;
        dragMoved = false;
        clearPendingClick();
        hideTimerControls();
        getFloatingAPI()?.dragEnd?.();
        getFloatingAPI()?.openContextMenu?.();
      });

      iconButton.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          clearPendingClick();
          if (currentMode === 'timer') {
            showTimerControls();
          } else {
            expandMainWindow();
          }
          return;
        }
        if ((event.key === 'F10' && event.shiftKey) || event.key === 'ContextMenu') {
          event.preventDefault();
          getFloatingAPI()?.openContextMenu?.();
          return;
        }
        const key = typeof event.key === 'string' ? event.key.toLowerCase() : '';
        const primaryHeld = navigator.platform.includes('Mac') ? event.metaKey : event.ctrlKey;
        if (key === 'm' && primaryHeld && !event.altKey) {
          event.preventDefault();
          getFloatingAPI()?.toggle?.();
        }
      });

      timerControls.addEventListener('click', (event) => {
        event.stopPropagation();
      });

      timerToggleButton.addEventListener('click', (event) => {
        event.preventDefault();
        event.stopPropagation();
        showTimerControls();
        getFloatingAPI()?.timerAction?.('startPause');
      });

      timerStopButton.addEventListener('click', (event) => {
        event.preventDefault();
        event.stopPropagation();
        hideTimerControls();
        getFloatingAPI()?.timerAction?.('stop');
      });

      promptTaskInput.addEventListener('input', () => {
        localTaskText = promptTaskInput.value;
        renderPrompt();
      });

      promptTaskInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' && !event.shiftKey) {
          const trimmedTask = promptTaskInput.value.trim();
          if (!trimmedTask) return;
          event.preventDefault();
          localTaskText = promptTaskInput.value;
          setPromptStage('start-chooser');
        }
      });

      promptTaskNextButton.addEventListener('click', () => {
        const trimmedTask = promptTaskInput.value.trim();
        if (!trimmedTask) return;
        localTaskText = promptTaskInput.value;
        setPromptStage('start-chooser');
      });

      promptResumeButton.addEventListener('click', () => {
        localTaskText = currentResumeTaskName || localTaskText;
        setPromptStage('start-chooser');
      });

      promptStartNewButton.addEventListener('click', () => {
        emitReentryAction('start-new-from-resume');
      });

      promptMinutesInput.addEventListener('input', () => {
        localMinutes = promptMinutesInput.value;
        renderPrompt();
      });

      promptMinutesInput.addEventListener('keydown', (event) => {
        if (event.key !== 'Enter') return;
        event.preventDefault();
        submitTimedSession(currentPromptKind);
      });

      promptStartTimedButton.addEventListener('click', () => {
        submitTimedSession(currentPromptKind);
      });

      promptFreeflowButton.addEventListener('click', () => {
        submitFreeflowSession(currentPromptKind);
      });

      promptQuick15.addEventListener('click', () => {
        localMinutes = '15';
        renderPrompt();
      });

      promptQuick25.addEventListener('click', () => {
        localMinutes = '25';
        renderPrompt();
      });

      promptQuick45.addEventListener('click', () => {
        localMinutes = '45';
        renderPrompt();
      });

      promptQuickCustom.addEventListener('click', () => {
        promptMinutesInput.focus();
        promptMinutesInput.select();
      });

      promptDismissButton.addEventListener('click', () => {
        openSnoozeOptions();
      });

      promptBackButton.addEventListener('click', () => {
        if (currentPromptStage === 'snooze-options') {
          setPromptStage(promptStageBeforeSnooze);
          return;
        }
        if (currentPromptStage === 'start-chooser') {
          setPromptStage(currentPromptKind === 'resume-choice' ? 'resume-choice' : 'task-entry');
        }
      });

      promptSnooze10.addEventListener('click', () => dismissWithSnooze('10m'));
      promptSnooze30.addEventListener('click', () => dismissWithSnooze('30m'));
      promptSnooze60.addEventListener('click', () => dismissWithSnooze('60m'));
      promptSnooze120.addEventListener('click', () => dismissWithSnooze('120m'));
      promptSnoozeReopen.addEventListener('click', () => dismissWithSnooze('reopen'));

      iconButton.setAttribute('title', 'Double-click for fullscreen. Right-click for Do Not Disturb.');
      getFloatingAPI()?.onPulse?.(triggerPulse);
      getFloatingAPI()?.onState?.(applyState);
    </script>
  </body>
</html>
